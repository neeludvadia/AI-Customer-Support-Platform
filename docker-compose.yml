version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_support_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ai_support_db
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ai_support_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
